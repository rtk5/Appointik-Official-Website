<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Website</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      text-align: center;
    }

    header {
      background: #333;
      color: white;
      padding: 1rem;
    }

    main {
      padding: 2rem;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #0070f3;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #005bb5;
    }
  </style>
</head>

<body>
  <header>
    <h1>Welcome to My Website 🚀</h1>
  </header>

  <main>
    <p>This is a sample index.html file.</p>
    <button onclick="sayHello()">Click Me</button>
  </main>

  <script>
    function sayHello() {
      alert("Hello, Rithvik!");
    }
  </script>
</body>
</html>
